<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Дмитрий</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="about.html">О себе</a>
            <a href="projects.html">Проекты</a>
            <a href="contact.html" class="active">Контакты</a>
        </nav>
        <button id="theme-toggle">Сменить тему</button>
        <h1>Контакты</h1>
    </header>

    <main>
        <section id="feedback">
            <h2>Связаться со мной</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Имя:</label>
                    <input type="text" id="name" name="name" placeholder="Введите ваше имя" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Сообщение:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Ваше сообщение..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Отправить</button>
            </form>
        </section>

        <section id="contact-info">
            <h2>Контактная информация</h2>
            <p><strong>Email:</strong> <a href="mailto:email@gmail.com">email@gmail.com</a></p>
            
            <div class="social-links">
                <p><strong>Социальные сети:</strong></p>
                <ul>
                    <li><a href="https://t.me/your_nick" target="_blank">Telegram</a></li>
                    <li><a href="https://github.com/your_nick" target="_blank">GitHub</a></li>
                    <li><a href="https://linkedin.com/in/your_nick" target="_blank">LinkedIn</a></li>
                    <li><a href="https://instagram.com/your_nick" target="_blank">Instagram</a></li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 dmitry_dev</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
